<!DOCTYPE html>
<html>
<head>
  <title>Precision Fit Protocol</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, select { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; }
    button { background: #000; color: #fff; padding: 12px 24px; border: none; cursor: pointer; width: 100%; font-size: 16px; }
    #result { margin-top: 24px; background: #f5f5f5; padding: 16px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Precision Fit Protocol</h2>
  <form id="pfpForm">
    <label>Your Photo</label>
    <input type="file" id="photo" accept="image/*" required>
    <label>Brand</label>
    <select id="brand">
      <option>Levis</option>
      <option>Zara</option>
      <option>HM</option>
      <option>Uniqlo</option>
    </select>
    <label>Size</label>
    <select id="size">
      <option>30</option>
      <option>32</option>
      <option>34</option>
    </select>
    <label>Your Waist (cm)</label>
    <input type="number" id="waist" placeholder="e.g. 82" required>
    <label>Your Inseam (cm)</label>
    <input type="number" id="inseam" placeholder="e.g. 76" required>
    <label>Your Hip (cm)</label>
    <input type="number" id="hip" placeholder="e.g. 94" required>
    <label>Your Shoulder (cm)</label>
    <input type="number" id="shoulder" placeholder="e.g. 44" required>
    <button type="submit">Check My Fit</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('pfpForm').onsubmit = async (e) => {
      e.preventDefault();
      document.getElementById('result').textContent = 'Analyzing...';
      const form = new FormData();
      form.append('photo', document.getElementById('photo').files[0]);
      form.append('brand', document.getElementById('brand').value);
      form.append('size', document.getElementById('size').value);
      form.append('waist', document.getElementById('waist').value);
      form.append('inseam', document.getElementById('inseam').value);
      form.append('hip', document.getElementById('hip').value);
      form.append('shoulder', document.getElementById('shoulder').value);
      const res = await fetch('/analyze', { method: 'POST', body: form });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    };
  </script>
</body>
</html>
